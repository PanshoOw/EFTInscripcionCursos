spring.application.name=cloudnative

# Perfil local utilizado por defecto.
# Puede sobrescribirse mediante SPRING_PROFILES_ACTIVE.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Puerto común de la aplicación.
server.port=${SERVER_PORT:8080}


# =========================================================
# SEGURIDAD COMÚN: AZURE AD B2C
# =========================================================

# Emisor utilizado para validar los tokens JWT.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_B2C_ISSUER_URI}

# Audiencia que deben contener los tokens emitidos para esta API.
app.security.azure.audience=${AZURE_B2C_AUDIENCE}


# =========================================================
# ALMACENAMIENTO COMÚN: AWS S3
# =========================================================

cloud.aws.region.static=${AWS_REGION:us-east-1}
cloud.aws.stack.auto=false

# Bucket utilizado para almacenar los resúmenes.
app.s3.bucket-name=${AWS_S3_BUCKET_NAME}